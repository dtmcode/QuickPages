version: '3.8'
services:
  redis:
    image: 'redis:alpine'
    restart: always
    volumes:
      - 'redis_data:/data'
    networks:
      - app
  backend:
  build:
    context: ./backend
    dockerfile: Dockerfile
  restart: always
  expose:
    - '3000'
  env_file:
    - ./backend/.env
  environment:
    REDIS_HOST: redis
    REDIS_PORT: 6379
    NODE_ENV: production
  depends_on:
    - redis
  networks:
    app:
    coolify:
      aliases:
        - quickpages-backend
volumes:
  redis_data: null
networks:
  app: null
  coolify:
    external: true